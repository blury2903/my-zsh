# Starship prompt config — https://starship.rs/config/
# Minimal seed (no nerd-font glyphs assumed). Explore richer presets with
# `starship preset --list`, then e.g. `starship preset nerd-font-symbols -o ~/.config/starship.toml`.

add_newline = true

# WSL2: scanning the cwd is slow on Windows-mounted paths (/mnt/c, DrvFs), so
# bump the directory-scan timeout above the 30ms default to silence the
# "Scanning current directory timed out" warning. Real fix: keep repos on the
# Linux filesystem (~) instead of /mnt/c — see command_timeout for git/cmd calls.
scan_timeout = 500
command_timeout = 1000

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "
